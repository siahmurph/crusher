<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Crusher — App Control</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
		<style>
			body {
				min-height: 100vh;
				background-color: var(--bs-body-bg);
			}

			.app-header {
				background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
				border-bottom: 1px solid rgba(255, 255, 255, 0.08);
			}

			[data-bs-theme="light"] .app-header {
				background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
			}

			.crusher-title {
				font-size: 3.2rem;
				font-weight: 900;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: #f97316;
				text-shadow:
					0 0 30px rgba(249, 115, 22, 0.5),
					0 2px 8px rgba(0, 0, 0, 0.6);
				line-height: 1;
				font-style: italic;
			}

			.crusher-sub {
				font-size: 0.75rem;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				opacity: 0.55;
			}

			.app-card {
				border-radius: 0.6rem;
				transition: box-shadow 0.2s;
			}

			.app-card.is-down {
				border-color: #dc3545 !important;
				box-shadow: 0 0 0 1px rgba(220, 53, 69, 0.35);
			}

			.app-card.is-live {
				border-color: rgba(255, 255, 255, 0.1) !important;
			}

			[data-bs-theme="light"] .app-card.is-live {
				border-color: #cbd5e1 !important;
			}

			.status-badge {
				font-size: 0.7rem;
				letter-spacing: 0.06em;
				padding: 0.3em 0.65em;
			}

			.toggle-btn {
				font-size: 0.9rem;
				font-weight: 600;
				letter-spacing: 0.03em;
				transition: all 0.15s;
			}

			.app-icon {
				font-size: 1.4rem;
				opacity: 0.75;
			}

			.updated-label {
				font-size: 0.7rem;
				opacity: 0.45;
			}

			.vanmanager-card {
				border-color: #0d6efd !important;
				background: linear-gradient(
					135deg,
					rgba(13, 110, 253, 0.06) 0%,
					transparent 100%
				);
			}

			.vanmanager-card .card-body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 200px;
				gap: 1rem;
			}

			textarea.msg-input {
				font-size: 0.8rem;
				resize: none;
			}
		</style>
	</head>
	<body>
		<header
			class="app-header px-4 py-3 mb-4 d-flex align-items-center justify-content-between">
			<div>
				<div class="crusher-title">
					<i class="bi bi-wrench-adjustable-circle-fill me-2 text-warning"></i
					>Crusher
				</div>
				<div class="crusher-sub text-secondary">App Maintenance Control</div>
			</div>
			<button
				class="btn btn-sm btn-outline-light border-0 opacity-75"
				id="theme-toggle"
				title="Toggle theme">
				<i class="bi bi-moon-fill" id="theme-icon"></i>
			</button>
		</header>

		<main class="container-lg px-3 px-md-4 pb-5">
			<div id="app-grid" class="row g-4">
				<!-- Populated by app.js -->
				<div class="col-12 text-secondary text-center py-5">
					<span class="spinner-border spinner-border-sm me-2"></span>Loading…
				</div>
			</div>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="app.js"></script>
	</body>
</html>
