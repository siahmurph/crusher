services:
  crusher:
    image: ghcr.io/siahmurph/crusher:latest
    container_name: crusher
    ports:
      - "8030:3000"
    volumes:
      - /var/crusher:/data
    restart: unless-stopped
    networks:
      - portainer_default
    environment:
      - PORTAINER_URL=http://portainer:9000
      - PORTAINER_API_KEY=ptr_nt8z8SiZJPfPICOTtdqUyNbyBAAzzimalIwUSFGyZek=
      - PORTAINER_ENDPOINT=1

networks:
  portainer_default:
    external: true
