name: Build and Push Crusher

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/siahmurph/crusher:latest
            ghcr.io/siahmurph/crusher:${{ github.sha }}

      - name: Trigger Portainer redeploy
        if: vars.PORTAINER_WEBHOOK_URL != ''
        run: curl -s -X POST "${{ vars.PORTAINER_WEBHOOK_URL }}"
